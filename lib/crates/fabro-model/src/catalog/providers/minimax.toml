estimated_output_tps = 45
aliases = ["minimax"]

[models."minimax-m2.5".limits]
context_window = 196608
max_output = 16384

[models."minimax-m2.5".features]
tools = true
vision = false
reasoning = false

[models."minimax-m2.5".costs]
input_cost_per_mtok = 0.3
output_cost_per_mtok = 1.2
