# Fabro built-in defaults — embedded at compile time.
# Dynamic and presence-gated defaults remain in Rust.
_version = 1

[workflow]
graph = "workflow.fabro"

[run.execution]
mode = "normal"
approval = "prompt"

[run.prepare]
timeout = "5m"

[run.clone]
enabled = true

[run.run_branch]
enabled = true
push = true

[run.meta_branch]
enabled = true
push = true

[run.environment]
id = "default"

[cli.output]
format = "text"
verbosity = "normal"

[cli.exec]
prevent_idle_sleep = false

[cli.updates]
check = true

[server.web]
enabled = true
url = "http://localhost:3000"

[server.scheduler]
max_concurrent_runs = 5

[server.artifacts]
provider = "local"
prefix = ""

[server.slatedb]
provider = "local"
prefix = ""
flush_interval = "1ms"
disk_cache = false
